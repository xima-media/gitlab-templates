# Usage: This template is intended to be included in other GitLab CI/CD configuration files.
# It defines reset jobs that can be used in a CI/CD pipeline.

# It requires RCLONE_RESET_STORAGE_ENV to be set as a CI/CD file variable containing the rclone config for the crypt remote used for database and media file transfer between source and target environment.


# Integration example in importing gitlab-ci.yml:

# include:
#   - remote: 'https://raw.githubusercontent.com/xima-media/gitlab-templates/<release>/reset.yml'

spec:
  inputs:
    reset_sync_dirs:
      type: string
      default: "fileadmin uploads"
      description: "Space separated list of directories in shared/public/ to sync from source to target environment."
      regex: ^[a-zA-Z0-9_. -]+$
    reset_sync_max_size:
      type: string
      default: "5M"
      description: "Maximum file size to sync from source to target environment, e.g. 5M or 1G."
      regex: ^[0-9]+[KMG]$
    reset_sync_excludes:
      type: array
      default:
        - '_processed_/**'
        - '_recycler_/**'
        - '_temp_/**'
        - '*.mp4'
        - '*.zip'
        - '*.pdf'
        - '*.exe'
        - '*.doc'
        - '*.docx'
        - '*.pptx'
        - '*.ppt'
        - '*.xls'
        - '*.xlsx'
        - '*.xlsm'
        - '*.tiff'
        - '*.tif'
        - '*.potx'
        - '*.mpg'
        - '*.mp3'
        - '*.avi'
        - '*.wmv'
        - '*.flv'
        - '*.eps'
        - '*.ai'
        - '*.mov'
      description: "Array of rclone --exclude patterns for media file sync."

.reset-prepare:
  script:
    # ensure RCLONE_RESET_STORAGE_ENV file variable is set
    - 'if [ ! -f "${RCLONE_RESET_STORAGE_ENV}" ]; then echo "RCLONE_RESET_STORAGE_ENV must be set as a CI/CD file variable!"; exit 1; fi'
    # configure sftp remote
    - rclone config create --non-interactive sftp sftp host=${SFTP_HOST} user=${SFTP_USER} port=22 key_use_agent=true
    # configure crypt remote
    - set -a && . ${RCLONE_RESET_STORAGE_ENV} && set +a
    - 'rclone config create --non-interactive --obscure ${CRYPT_NAME} crypt remote=${CRYPT_REMOTE} filename_encoding=base64 password=${CRYPT_PASSWORD} password2=${CRYPT_PASSWORD2}'

# Requires a scheduled job with RESET_JOB == true no RESET_DOWNLOAD_TARGET_SELECTOR set
reset-upload-source:
  needs:
    - job: build-php
  stage: build
  extends: .deploy-prepare
  variables:
  script:
    # use "stage=live" as default if not defined
    - RESET_UPLOAD_SOURCE_SELECTOR="${RESET_UPLOAD_SOURCE_SELECTOR:-stage=live}"
    # install rclone and jq
    - apk add --update --quiet rclone jq && rclone version && jq --version
    # get ssh connection params from deploy.php
    - SFTP_HOST=$(vendor/bin/dep config --format json ${RESET_UPLOAD_SOURCE_SELECTOR} | jq -r '.[].hostname')
    - SFTP_USER=$(vendor/bin/dep config --format json ${RESET_UPLOAD_SOURCE_SELECTOR} | jq -r '.[].remote_user')
    - DEPLOY_PATH=$(vendor/bin/dep config --format json ${RESET_UPLOAD_SOURCE_SELECTOR} | jq -r '.[].deploy_path')
    # set up rclone remotes
    - !reference [.reset-prepare, script]
    # dump database on source
    - vendor/bin/dep db:rmdump "${RESET_UPLOAD_SOURCE_SELECTOR}" --options=dumpcode:resetJob --no-interaction -vvv
    - vendor/bin/dep db:export "${RESET_UPLOAD_SOURCE_SELECTOR}" --options=dumpcode:resetJob --no-interaction -vvv
    - vendor/bin/dep db:process "${RESET_UPLOAD_SOURCE_SELECTOR}" --options=dumpcode:resetJob --no-interaction -vvv
    - vendor/bin/dep db:compress "${RESET_UPLOAD_SOURCE_SELECTOR}" --options=dumpcode:resetJob --no-interaction -vvv
    # sync database from sftp remote to crypt remote
    - 'rclone sync -v --inplace --metadata --include "*dumpcode=resetJob*" --delete-excluded "sftp:${DEPLOY_PATH}/.dep/database/dumps/" ${CRYPT_NAME}:.dep/database/dumps'
    # prepare exclude args for rclone
    - |
      EXCLUDE_ARGS=""
      for pattern in $(echo '$[[ inputs.reset_sync_excludes ]]' | jq -r '.[]'); do
        EXCLUDE_ARGS="$EXCLUDE_ARGS --exclude \"$pattern\""
      done
      echo "Prepared rclone exclude args: $EXCLUDE_ARGS"
    # sync media files from sftp to crypt remote with applied filters
    - |
      for dir in $[[ inputs.reset_sync_dirs ]]; do
        CMD="rclone sync -v --inplace --metadata --size-only \"sftp:${DEPLOY_PATH}/shared/public/${dir}/\" \"${CRYPT_NAME}:shared/public/${dir}/\" --max-size=\"$[[ inputs.reset_sync_max_size ]]\" --delete-excluded $EXCLUDE_ARGS"
        echo "$CMD"
        sh -c "$CMD"
      done
  rules:
    - if: $RESET_JOB == "true" && $RESET_DOWNLOAD_TARGET_SELECTOR == null

# Requires a scheduled job with RESET_JOB == true and RESET_DOWNLOAD_TARGET_SELECTOR set with target host selector
reset-download-target:
  needs:
    - job: build-php
  stage: build
  extends: .deploy-prepare
  script:
    # install rclone and jq
    - apk add --update --quiet rclone jq && rclone version && jq --version
    # get ssh connection params from deploy.php
    - SFTP_HOST=$(vendor/bin/dep config --format json ${RESET_DOWNLOAD_TARGET_SELECTOR} | jq -r '.[].hostname')
    - SFTP_USER=$(vendor/bin/dep config --format json ${RESET_DOWNLOAD_TARGET_SELECTOR} | jq -r '.[].remote_user')
    - DEPLOY_PATH=$(vendor/bin/dep config --format json ${RESET_DOWNLOAD_TARGET_SELECTOR} | jq -r '.[].deploy_path')
    # set up rclone remotes
    - !reference [.reset-prepare, script]
    # remove old dump on target
    - vendor/bin/dep db:rmdump "${RESET_DOWNLOAD_TARGET_SELECTOR}" --options=dumpcode:resetJob --no-interaction -vvv
    # copy database from crypt remote to sftp remote
    - 'rclone copy -v --inplace --metadata "${CRYPT_NAME}:.dep/database/dumps/" "sftp:${DEPLOY_PATH}/.dep/database/dumps/"'
    # import database on target
    - vendor/bin/dep db:decompress "${RESET_DOWNLOAD_TARGET_SELECTOR}" --options=dumpcode:resetJob --no-interaction -vvv
    - vendor/bin/dep db:process "${RESET_DOWNLOAD_TARGET_SELECTOR}" --options=dumpcode:resetJob --no-interaction -vvv
    - vendor/bin/dep db:import "${RESET_DOWNLOAD_TARGET_SELECTOR}" --options=dumpcode:resetJob --no-interaction -vvv
    - vendor/bin/dep db:rmdump "${RESET_DOWNLOAD_TARGET_SELECTOR}" --options=dumpcode:resetJob --no-interaction -vvv
    # copy media files from crypt remote to sftp remote and fix file permissions
    - |
      for dir in $[[ inputs.reset_sync_dirs ]]; do
        CMD="rclone copy -v --inplace --metadata --no-update-modtime --no-update-dir-modtime --sftp-set-modtime=false --size-only \"${CRYPT_NAME}:shared/public/${dir}/\" \"sftp:${DEPLOY_PATH}/shared/public/${dir}/\""
        echo "$CMD"
        sh -c "$CMD"
        vendor/bin/dep run "find public/${dir}/ -type f ! -perm 660 -user ${SFTP_USER} -exec chmod 660 {} \;" "${RESET_DOWNLOAD_TARGET_SELECTOR}" --no-interaction -vvv
        vendor/bin/dep run "find public/${dir}/ -type d ! -perm 2770 -user ${SFTP_USER} -exec chmod 2770 {} \;" "${RESET_DOWNLOAD_TARGET_SELECTOR}" --no-interaction -vvv
      done
  rules:
    - if: $RESET_JOB == "true" && $RESET_DOWNLOAD_TARGET_SELECTOR != null
