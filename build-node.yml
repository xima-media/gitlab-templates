build-node:
  stage: build
  cache:
    - key:
        files:
          - package-lock.json
      paths:
        - node_modules/
  script:
    - if [ ! -d "node_modules" ]; then npm ci --unsafe-perm; fi
    - npm run build
  artifacts:
    paths:
    expire_in: 1 day
  rules:
    - if: '$RESET_JOB != "true"'
    - if: '$RESET_JOB == "true" && $RESET_DOWNLOAD_TARGET_SELECTOR != null'
